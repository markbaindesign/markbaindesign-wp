<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Colors / Accent + Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; }
  .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; }
  .swatch { display:flex; flex-direction:column; gap:6px; }
  .chip { height:74px; border:1px solid var(--rule); }
  .name { font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--ink); }
  .hex  { font-family:var(--font-mono-2); font-size:11px; color:var(--graphite); }
  .lbl  { font-family:var(--font-mono-2); font-size:10px; color:var(--pencil); text-transform:uppercase; letter-spacing:.04em; margin:6px 0 -2px; }
</style></head>
<body>
  <div class="lbl">[ accent ]</div>
  <div class="grid" style="margin-bottom:18px">
    <div class="swatch"><div class="chip" style="background:var(--clay)"></div><div class="name">clay</div><div class="hex">#C96442</div></div>
    <div class="swatch"><div class="chip" style="background:var(--clay-deep)"></div><div class="name">clay-deep</div><div class="hex">#A24E32</div></div>
    <div class="swatch"><div class="chip" style="background:var(--clay-soft)"></div><div class="name">clay-soft</div><div class="hex">#E8B59E</div></div>
    <div class="swatch"><div class="chip" style="background:var(--phosphor)"></div><div class="name">phosphor</div><div class="hex">#22C55E</div></div>
  </div>
  <div class="lbl">[ semantic ]</div>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:var(--link)"></div><div class="name">link</div><div class="hex">#1A4FE3</div></div>
    <div class="swatch"><div class="chip" style="background:var(--visited)"></div><div class="name">visited</div><div class="hex">#6B3FB7</div></div>
    <div class="swatch"><div class="chip" style="background:var(--amber)"></div><div class="name">amber</div><div class="hex">#D89A2B</div></div>
    <div class="swatch"><div class="chip" style="background:var(--vermilion)"></div><div class="name">vermilion</div><div class="hex">#C43D2F</div></div>
  </div>
</body></html>
