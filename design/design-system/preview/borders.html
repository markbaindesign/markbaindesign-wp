<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Borders & Rules</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; align-items:center; gap:18px; }
  .lbl { font-family:var(--font-mono-2); font-size:11px; color:var(--pencil); width:160px; flex-shrink:0; }
  .demo { flex:1; }
  .one  { border-top:1px solid var(--rule); height:0; }
  .two  { border-top:2px solid var(--ink); height:0; }
  .double { border-top:1px solid var(--ink); border-bottom:1px solid var(--ink); height:2px; box-sizing:content-box; }
  .ascii  { font-family:var(--font-mono-2); color:var(--ink); font-size:14px; letter-spacing:0; }
  .frame  { border:1px solid var(--rule); padding:8px 12px; font-family:var(--font-mono); font-size:12px; color:var(--ink); display:inline-block; }
  .frame-2 { border:2px solid var(--ink); padding:8px 12px; font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--ink); display:inline-block; }
</style></head>
<body>
  <div class="row"><div class="lbl">[hairline / 1px]</div><div class="demo"><div class="one"></div></div></div>
  <div class="row"><div class="lbl">[heavy / 2px]</div><div class="demo"><div class="two"></div></div></div>
  <div class="row"><div class="lbl">[double rule]</div><div class="demo"><div class="double"></div></div></div>
  <div class="row"><div class="lbl">[ascii rule]</div><div class="demo"><div class="ascii">────────────────────────────────────────────────────</div></div></div>
  <div class="row"><div class="lbl">[frame / 1px]</div><div class="demo"><span class="frame">portfolio.txt</span></div></div>
  <div class="row"><div class="lbl">[frame / 2px brand]</div><div class="demo"><span class="frame-2">Bd</span></div></div>
</body></html>
