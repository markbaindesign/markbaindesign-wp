<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Links & nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; font-family:var(--font-mono); }
  .row { padding:8px 0; border-bottom:1px solid var(--rule-soft); }
  .lbl { font-family:var(--font-mono-2); font-size:10px; color:var(--pencil); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  nav { display:flex; gap:18px; align-items:center; }
  nav a { font-size:14px; }
  nav .sep { color:var(--pencil); }
  .breadcrumb { font-family:var(--font-mono-2); font-size:13px; color:var(--graphite); }
  .breadcrumb a { color:var(--graphite); text-decoration:underline; }
  .breadcrumb .sep { color:var(--pencil); margin:0 6px; }
</style></head>
<body>
  <div class="row"><div class="lbl">[ link states ]</div>
    <a href="#" style="margin-right:18px">default link</a>
    <a href="#" style="color:var(--ink); text-decoration-thickness:2px; margin-right:18px">hover link</a>
    <a href="#" style="color:var(--visited); margin-right:18px">visited link</a>
  </div>
  <div class="row"><div class="lbl">[ primary nav ]</div>
    <nav>
      <a href="#">Home</a><span class="sep">/</span>
      <a href="#">About</a><span class="sep">/</span>
      <a href="#">Services</a><span class="sep">/</span>
      <a href="#">Work</a><span class="sep">/</span>
      <a href="#">Contact</a>
    </nav>
  </div>
  <div class="row"><div class="lbl">[ breadcrumb ]</div>
    <div class="breadcrumb"><a href="#">~</a><span class="sep">/</span><a href="#">work</a><span class="sep">/</span><a href="#">portfolio</a><span class="sep">/</span><span style="color:var(--ink)">mhairi-mcfarlane</span></div>
  </div>
</body></html>
