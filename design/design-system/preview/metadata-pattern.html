<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Bracket metadata</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; font-family:var(--font-mono); color:var(--ink); }
  .row { display:flex; gap:12px; align-items:baseline; padding:8px 0; border-bottom:1px solid var(--rule-soft); }
  .row:last-child { border-bottom:0; }
  .name { font-weight:700; font-size:18px; letter-spacing:-0.02em; }
  .meta { font-family:var(--font-mono-2); font-size:13px; color:var(--graphite); }
  .meta::before { content:"["; color:var(--pencil); }
  .meta::after  { content:"]"; color:var(--pencil); }
  .sep { color:var(--pencil); }
  .label { font-family:var(--font-mono-2); font-size:13px; color:var(--graphite); }
  .label .k { color:var(--pencil); }
</style></head>
<body>
  <div class="row"><div class="name">Mark Crawford Bain</div><div class="meta">WordPress Designer &amp; Developer</div></div>
  <div class="row"><span class="label"><span class="k">Email:</span> <a href="#">mark@bain.design</a></span><span class="sep">/</span><span class="label"><span class="k">Site:</span> <a href="#">bain.design</a></span></div>
  <div class="row"><div class="meta">2025 / branding</div><div class="sep">/</div><div class="meta">wordpress</div><div class="sep">/</div><div class="meta">php</div></div>
  <div class="row"><div style="font-family:var(--font-mono-2); font-size:14px;">$ <span style="color:var(--phosphor)">▌</span></div><div class="meta">terminal prompt</div></div>
</body></html>
