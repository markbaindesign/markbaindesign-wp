<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Glyph vocabulary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; }
  table { width:100%; border-collapse:collapse; font-family:var(--font-mono); font-size:14px; }
  td { padding:8px 10px; border-bottom:1px solid var(--rule-soft); vertical-align:middle; }
  td:first-child { width:60px; text-align:center; font-size:22px; color:var(--ink); }
  td:nth-child(2) { color:var(--graphite); width:160px; }
  td:nth-child(3) { color:var(--pencil); font-family:var(--font-mono-2); font-size:12px; }
  .check { color:var(--phosphor); }
  .heart { color:var(--clay); }
  .cur { color:var(--phosphor); }
</style></head>
<body>
  <table>
    <tr><td class="check">✔</td><td>completed bullet</td><td>U+2714</td></tr>
    <tr><td>→</td><td>navigation / next</td><td>U+2192</td></tr>
    <tr><td>↗</td><td>external link</td><td>U+2197</td></tr>
    <tr><td class="cur">_</td><td>cursor / prompt</td><td>U+005F</td></tr>
    <tr><td>[ ]</td><td>metadata frame</td><td>U+005B / U+005D</td></tr>
    <tr><td>/</td><td>inline separator</td><td>U+002F</td></tr>
    <tr><td class="heart">♥</td><td>signature glyph</td><td>U+2665</td></tr>
    <tr><td>─ │ ┌ ┐</td><td>box-drawing</td><td>U+2500..</td></tr>
  </table>
</body></html>
