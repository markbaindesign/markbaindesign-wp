<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 24px; }
  .row { display:flex; align-items:center; gap:14px; padding:5px 0; border-bottom:1px dashed var(--rule-soft); }
  .row:last-child { border-bottom:0; }
  .tok { font-family:var(--font-mono-2); font-size:12px; color:var(--ink); width:78px; }
  .px  { font-family:var(--font-mono-2); font-size:11px; color:var(--pencil); width:48px; }
  .bar { background:var(--ink); height:14px; }
</style></head>
<body>
  <div class="row"><div class="tok">--space-1</div><div class="px">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="tok">--space-2</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tok">--space-3</div><div class="px">12px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="tok">--space-4</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tok">--space-5</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tok">--space-6</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tok">--space-7</div><div class="px">48px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="tok">--space-8</div><div class="px">64px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="tok">--space-9</div><div class="px">96px</div><div class="bar" style="width:96px"></div></div>
</body></html>
