<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Shadows / Press</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; display:flex; gap:32px; align-items:flex-end; }
  .demo { display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
  .lbl  { font-family:var(--font-mono-2); font-size:11px; color:var(--pencil); }
  .btn-flat { background:var(--ink); color:var(--paper); border:1px solid var(--ink); padding:10px 18px; font-family:var(--font-mono); font-weight:700; font-size:14px; }
  .btn-press { background:var(--ink); color:var(--paper); border:1px solid var(--ink); padding:10px 18px; font-family:var(--font-mono); font-weight:700; font-size:14px; box-shadow:var(--shadow-press); }
  .btn-press-2 { background:var(--clay); color:var(--paper); border:1px solid var(--ink); padding:10px 18px; font-family:var(--font-mono); font-weight:700; font-size:14px; box-shadow:var(--shadow-press-2); }
</style></head>
<body>
  <div class="demo"><div class="btn-flat">flat / default</div><div class="lbl">[no shadow]</div></div>
  <div class="demo"><div class="btn-press">press / hover</div><div class="lbl">[2px 2px 0 ink]</div></div>
  <div class="demo"><div class="btn-press-2">stamp / cta</div><div class="lbl">[4px 4px 0 ink]</div></div>
</body></html>
