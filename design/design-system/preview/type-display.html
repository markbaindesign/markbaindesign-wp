<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Type / Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; }
  .row { display:flex; align-items:baseline; gap:18px; padding:10px 0; border-bottom:1px solid var(--rule-soft); }
  .row:last-child { border-bottom:0; }
  .meta { font-family:var(--font-mono-2); font-size:11px; color:var(--pencil); width:120px; flex-shrink:0; }
  .specimen { font-family:var(--font-mono); font-weight:700; color:var(--ink); letter-spacing:-0.02em; line-height:1.05; }
</style></head>
<body>
  <div class="row"><div class="meta">[h1 / 64px / 700]</div><div class="specimen" style="font-size:48px">Friendly websites</div></div>
  <div class="row"><div class="meta">[h2 / 44px / 700]</div><div class="specimen" style="font-size:36px">Bespoke WordPress</div></div>
  <div class="row"><div class="meta">[h3 / 32px / 700]</div><div class="specimen" style="font-size:28px">Themes & plugins</div></div>
  <div class="row"><div class="meta">[h4 / 24px / 700]</div><div class="specimen" style="font-size:22px">Latest projects</div></div>
</body></html>
