<!doctype html>
<html><head><meta charset="utf-8"><title>Bain — Colors / Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; }
  .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; }
  .swatch { display:flex; flex-direction:column; gap:6px; }
  .chip { height:74px; border:1px solid var(--rule); }
  .name { font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--ink); letter-spacing:0; }
  .hex  { font-family:var(--font-mono-2); font-size:11px; color:var(--graphite); }
</style></head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:var(--paper)"></div><div class="name">paper</div><div class="hex">#F5F0E8</div></div>
    <div class="swatch"><div class="chip" style="background:var(--paper-deep)"></div><div class="name">paper-deep</div><div class="hex">#EDE6DA</div></div>
    <div class="swatch"><div class="chip" style="background:var(--paper-pure); border:1px solid var(--rule-soft)"></div><div class="name">paper-pure</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch"><div class="chip" style="background:var(--ink)"></div><div class="name">ink</div><div class="hex">#141413</div></div>
    <div class="swatch"><div class="chip" style="background:var(--graphite)"></div><div class="name">graphite</div><div class="hex">#3D3D3A</div></div>
    <div class="swatch"><div class="chip" style="background:var(--pencil)"></div><div class="name">pencil</div><div class="hex">#8C8A85</div></div>
    <div class="swatch"><div class="chip" style="background:var(--rule)"></div><div class="name">rule</div><div class="hex">#1F1F1D</div></div>
    <div class="swatch"><div class="chip" style="background:var(--rule-soft)"></div><div class="name">rule-soft</div><div class="hex">#D8D0C0</div></div>
  </div>
</body></html>
